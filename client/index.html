<html>
    <head>
        <title>Pixel Kingdoms</title>
        <link rel="stylesheet" href="https://use.typekit.net/jbe5uxg.css" />
        <style>
            html {
                font-family: "myriad-pro";
                font-weight: 400;
                color: white;
            }

            .slots {
                background-color: #636363;

                display: flex;
                box-sizing: content-box;
                justify-content: center;
                border-image: url("/assets/ui/border.png") 9 / 9px / 0 round;
                border-width: 12px;
                border-style: solid;

                border-collapse: separate;
                border-spacing: 4px 0;
            }
            .slot {
                margin: 2px;
                padding: 20px;
                width: 10px;
                height: 10px;

                background-color: #525252;
                border-image: url("/assets/ui/slot_border.png") 4 / 4px / 0 round;
                border-width: 4px;
                border-style: solid;

                image-rendering: pixelated;
                position: relative;
            }
            .slot:hover {
                filter: brightness(1.05);
            }
            .selected {
                background-color: #848484 !important;
                border: 4px solid white !important;
            }
            .slot_sprite {
                pointer-events: none;
                background-color: transparent;

                background-image: url("/assets/assets.png");
                background-position: 999px -10px;
                background-repeat: no-repeat;
                background-size: 512px 512px;
                padding: 0;
                width: 10px;
                height: 10px;
                scale: 4;
                image-rendering: pixelated;
                border: 0;
                filter: drop-shadow(0.5px 0 0 #2A2A2A)
                    drop-shadow(-0.5px 0 0 #2A2A2A) drop-shadow(0 0.5px 0 #2A2A2A)
                    drop-shadow(0 -0.5px 0 #2A2A2A);
            }

            .healthbar {
                position: relative;
                background-color: #636363;
                height: 0.25rem;

                display: flex;
                box-sizing: content-box;
                justify-content: center;
                border-image: url("/assets/ui/health_border.png") 9 / 9px / 0
                    round;
                border-width: 12px;
                border-style: solid;
            }

            .health {
                background-color: #e14b4b;
                height: 100%;
                border-image: url("/assets/ui/health_border.png") 9 / 9px / 0
                    round;
                border-width: 12px;
                border-style: solid;

                position: absolute;
                bottom: 50%;
                left: -12px;

                transform: translate(0, 50%);
                transition: width 0.3s ease;
            }

            #health_label {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                margin: 0;
            }

            .bottom_container {
                position: absolute;
                bottom: 1rem;
                left: 50%;
                transform: translate(-50%, 0);
            }

            .message_container {
                position: absolute;
                bottom: 1rem;
                left: 1rem;
                margin: 0;

                width: 20rem;
                max-width: 20rem;
                height: 10rem;
                max-height: 10rem;
                overflow: hidden;

                display: flex;
                flex-direction: column;
                justify-content: flex-end;
                padding: 1rem;

                pointer-events: none;
                mask-image: linear-gradient(to bottom, transparent 0%, black 50%);
            }

            .outlined_text {
                text-shadow:
                    -1px -1px 0 black,
                     1px -1px 0 black,
                    -1px  1px 0 black,
                     1px  1px 0 black;
            }
            .message_box {
                pointer-events: all;
                background-color: transparent;
                border: none;

                font: inherit;
                color: #fff;
            }
            .message_box::placeholder {
              color: #fff;
              opacity: 0.5;
              text-shadow: none;
            }

            .message {
                color: yellow;
                display: flex;
                align-items: flex-start;
                margin-bottom: 0.5rem;
            }
            .message label {
                margin-right: 0.5rem;
            }
            .message p {
                color: white;
                margin: 0;
            }
            .error p {
                color: palevioletred;
            }
            .error label {
                color: red;
            }
            .success p {
                color: palegreen;
            }
            .success label {
                color: mediumseagreen;
            }

            .chat_bubble {
                position: absolute;
                bottom: calc(50% + 32px);
                left: calc(50%);
                transform: translate(-50%, -50%);

                color: #636363;
                background-color: white;
                background-clip: padding-box;
                border-image: url("/assets/ui/chat_bubble.png") 9 / 12px / 0 round;
                border-width: 12px;
                border-style: solid;

                max-width: 200px;
                word-wrap: break-word;
                white-space: normal;
                text-align: center;

                filter: opacity(0.9);
            }
            .hidden {
                display: none !important;
            }
        </style>
        <link rel="stylesheet" href="inventory.css">
    </head>
    <body style="margin: 0">
        <div class="bottom_container">
            <div id="healthbar" class="healthbar">
                <div id="health" class="health" style="width: 90%">

                </div>
                <p id="health_label">25</p>
            </div>
            <div id="hotbar" class="slots"></div>
        </div>
        <form onsubmit="submit_message(event)" class="message_container">
            <div class="messages" id="messages">
            </div>
            <input id="message_box" class="message_box outlined_text" placeholder="Ener to type a message..."></input>
        </form>

        <div id="inventory" class="inventory_container hidden">
            <div class="inventory_panel">
                <div class="inventory_top">
                    <canvas id="inventory_preview" class="inventory_preview" width="112" height="112"></canvas>
                    <div id="equipment_slots" class="equipment_slots"></div>
                </div>
                <div id="inventory_storage" class="inventory_storage"></div>
                <div class="seperator"></div>
                <div id="inventory_hotbar" class="inventory_hotbar"></div>
            </div>
        </div>

        <script src="/scripts/pkgs/pixi.js"></script>
        <script src="/scripts/pkgs/filters.js"></script>

        <script src="/scripts/data.js"></script>
        <script src="/scripts/engine/networking.js"></script>

        <script src="/scripts/graphics/app.js"></script>
        <script src="/scripts/graphics/load_textures.js"></script>
        <script src="/scripts/graphics/tiles.js"></script>
        <script src="/scripts/graphics/objects.js"></script>

        <script src="/scripts/engine/gameplay/bombs.js"></script>
        <script src="/scripts/engine/gameplay/particles.js"></script>
        <script src="/scripts/engine/gameplay/characters.js"></script>
        <script src="/scripts/engine/gameplay/npcs.js"></script>
        <script src="/scripts/engine/gameplay/loot.js"></script>
        <script src="/scripts/engine/gameplay/projectiles.js"></script>

        <script src="/scripts/engine/tabs/tabmanager.js"></script>

        <script src="/scripts/engine/inventory/inventory.js"></script>
        <script src="/scripts/engine/inventory/preview.js"></script>

        <script src="/scripts/engine/chat.js"></script>
        <script src="/scripts/engine/engine.js"></script>
        <script src="/scripts/engine/player_character.js"></script>

        <script>
            init();
        </script>
    </body>
</html>
