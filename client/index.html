<html>
    <head>
        <title>Island of Balor</title>
        <link rel="stylesheet" href="https://use.typekit.net/jbe5uxg.css">
        <style>
            .slots {
                position: absolute;
                background-color: #636363;

				bottom: 1rem;
				left: 50%;
				transform: translate(-50%, 0);
				
				display: flex;
				box-sizing: content-box;
				justify-content: center;
				border-image: url('/assets/ui/border.png') 9 / 9px / 0 round;
				border-width: 12px;
				border-style: solid;

                border-collapse: separate;
                border-spacing: 4px 0;
            }
            .slot {
                background-color: #757575;
                margin: 2px;
                padding: 20px;
                width: 10px;
                height: 10px;
                
                border: transparent;
				border-width: 4px;
				border-style: solid;
                
                image-rendering: pixelated;
            }
            .slot:hover {
                background-color: #848484;
            }
            .selected {
                background-color: #848484;
            }
            .slot button {
                background-color: transparent;

                background-image: url('/assets/assets.png');
                background-repeat: no-repeat;
                background-size: 512px 512px;
                padding: 0;
                width: 10px;
                height: 10px;
                scale: 4;
                image-rendering: pixelated;
                border: 0;
                filter:
					drop-shadow(0.5px 0 0.5px #333333c4)
					drop-shadow(-0.5px 0 0.5px #333333c4)
					drop-shadow(0 0.5px 0.5px #333333c4)
					drop-shadow(0 -0.5px 0.5px #333333c4);
            }
        </style>
    </head>
