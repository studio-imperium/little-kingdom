<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Item Maker</title>
<link rel="stylesheet" href="/tools/shared/style.css">
<style>
  .item-grid {
    grid-template-columns: 360px 1fr 360px;
    gap: 0;
  }
  #left-panel  { grid-column: 1; border-right: 1px solid var(--border); }
  #preview-host{ grid-column: 2; }
  #right-panel { grid-column: 3; border-left: 1px solid var(--border); display: flex; flex-direction: column; }
  #obj-tree { flex: 1; overflow: auto; padding: 8px; }
  #obj-inspector { border-top: 1px solid var(--border); padding: 8px; max-height: 50%; overflow: auto; }
</style>
</head>
<body>

<div class="toolbar">
  <h2>Item Maker</h2>
  <label>Item</label>
  <select id="item-select"></select>
  <button id="item-new" class="small">+ new</button>
  <button id="item-clone" class="small">clone</button>
  <button id="item-delete" class="small danger">delete</button>
  <span class="spacer"></span>
  <span class="status" id="status"></span>
  <button id="save" class="primary">Save</button>
</div>

<div class="app-grid item-grid">

  <div id="left-panel" class="panel">
    <div class="panel-header">Stats</div>
    <div class="panel-body" id="stats-host"></div>

    <div class="panel-header">Attacks</div>
    <div class="panel-body" id="attacks-host"></div>
    <div class="panel-body">
      <button id="add-attack" class="small">+ attack</button>
    </div>
  </div>

  <div id="preview-host">
    <div class="preview-controls">
      <button id="zoom-out" class="small">−</button>
      <span id="zoom-label" class="muted" style="padding:0 6px;align-self:center;font-size:11px">1.0x</span>
      <button id="zoom-in" class="small">+</button>
    </div>
  </div>

  <div id="right-panel" class="panel">
    <div class="panel-header">Visual</div>
    <div id="obj-tree" class="tree"></div>
    <div id="obj-inspector"></div>
  </div>

</div>

<script src="/tools/shared/api.js"></script>
<script src="/tools/shared/dropdowns.js"></script>
<script src="/tools/shared/preview.js"></script>
<script src="/tools/shared/object_editor.js"></script>
<script>
const SLOTS = ["head", "body", "hand"]
const STAT_FIELDS = ["health", "speed", "damage", "reload", "regen"]
const LAYER_ORDER = { misc: 0, loot: 1, hand: 2, body: 3, head: 4, bomb: 5 }

let items = []
let animations = []
let projectiles = []
let bombs = []

let currentIdx = 0
let previewApi = null
let visualTab = "hand"
let rebuildTimer = null
let objEditor = null

const statsHost = document.getElementById("stats-host")
const attacksHost = document.getElementById("attacks-host")
const itemSelect = document.getElementById("item-select")
const status = document.getElementById("status")

async function init() {
  ;[items, animations, projectiles, bombs] = await Promise.all([
    loadAsset("items.json"),
    loadAsset("animations.json"),
    loadAsset("projectiles.json"),
    loadAsset("bombs.json"),
  ])

  previewApi = await makePreview(document.getElementById("preview-host"), { zoom: 1.5 })
  updateZoomLabel()

  refillItemSelect()
  loadItem(0)
}

function refillItemSelect() {
  fillSelect(itemSelect, items)
  itemSelect.value = String(items[currentIdx]?.id ?? 0)
}

function currentItem() {
  return items[currentIdx]
}

function reindexItems() {
  for (let i = 0; i < items.length; i++) items[i].id = i
}

function loadItem(idx) {
  if (idx < 0 || idx >= items.length) return
  currentIdx = idx
  visualTab = "hand"
  renderStats()
  renderAttacks()
  renderVisual()
  rebuildPreview()
}

function rebuildPreview() {
  if (!previewApi) return
  previewApi.clear()
  const it = currentItem()
  if (!it) return

  const parts = []
  const defaultHead = items.find((i) => i.id === 0)
  const defaultBody = items.find((i) => i.id === 1)
  if (defaultHead && it.type !== "head") parts.push(defaultHead.equipped)
  if (defaultBody && it.type !== "body") parts.push(defaultBody.equipped)
  if (it.type === "head" && it.equipped) parts.push(it.equipped)
  if (it.type === "body" && it.equipped) parts.push(it.equipped)
  if (it.hand && Object.keys(it.hand).length) parts.push(it.hand)

  parts.sort((a, b) => (LAYER_ORDER[a?.label] ?? -1) - (LAYER_ORDER[b?.label] ?? -1))

  const c = new PIXI.Container()
  for (const p of parts) {
    if (p && Object.keys(p).length) c.addChild(buildObject(p))
  }
  previewApi.add(c)
}

function scheduleRebuild() {
  clearTimeout(rebuildTimer)
  rebuildTimer = setTimeout(rebuildPreview, 50)
}

function numField(label, value, onChange, step = 0.5) {
  const row = document.createElement("div"); row.className = "row"
  const lab = document.createElement("label")
  lab.textContent = label; lab.style.width = "90px"; lab.style.textAlign = "right"
  const inp = document.createElement("input")
  inp.type = "number"; inp.step = step
  inp.value = value !== undefined ? value : ""
  inp.addEventListener("input", () => {
    const v = inp.value === "" ? undefined : Number(inp.value)
    onChange(v)
  })
  row.appendChild(lab); row.appendChild(inp)
  return row
}
function textField(label, value, onChange) {
  const row = document.createElement("div"); row.className = "row"
  const lab = document.createElement("label")
  lab.textContent = label; lab.style.width = "90px"; lab.style.textAlign = "right"
  const inp = document.createElement("input")
  inp.type = "text"
  inp.value = value !== undefined ? value : ""
  inp.style.flex = "1"
  inp.addEventListener("input", () => onChange(inp.value))
  row.appendChild(lab); row.appendChild(inp)
  return row
}
function enumField(label, value, options, onChange) {
  const row = document.createElement("div"); row.className = "row"
  const lab = document.createElement("label")
  lab.textContent = label; lab.style.width = "90px"; lab.style.textAlign = "right"
  const sel = document.createElement("select")
  for (const o of options) {
    const opt = document.createElement("option")
    opt.value = o; opt.textContent = o
    sel.appendChild(opt)
  }
  sel.value = value || options[0]
  sel.addEventListener("change", () => onChange(sel.value))
  row.appendChild(lab); row.appendChild(sel)
  return row
}
function selectField(label, value, items, onChange, opts) {
  const row = document.createElement("div"); row.className = "row"
  const lab = document.createElement("label")
  lab.textContent = label; lab.style.width = "90px"; lab.style.textAlign = "right"
  const sel = document.createElement("select")
  fillSelect(sel, items, opts || {})
  sel.value = String(value !== undefined ? value : "")
  sel.addEventListener("change", () => onChange(Number(sel.value)))
  row.appendChild(lab); row.appendChild(sel)
  return row
}

function renderStats() {
  statsHost.innerHTML = ""
  const it = currentItem()
  if (!it) return

  statsHost.appendChild(textField("display", it.display, (v) => {
    it.display = v; refillItemSelect()
  }))
  const idRow = numField("id", it.id, () => {}, 1)
  idRow.querySelector("input").disabled = true
  statsHost.appendChild(idRow)
  statsHost.appendChild(textField("description", it.description, (v) => { it.description = v }))
  statsHost.appendChild(enumField("type", it.type, SLOTS, (v) => {
    it.type = v
    // if switching away from head/body, equipped is irrelevant; keep data but don't render it
    visualTab = "hand"
    renderStats(); renderAttacks(); renderVisual(); scheduleRebuild()
  }))
  statsHost.appendChild(textField("on_use", it.on_use, (v) => {
    if (v) it.on_use = v
    else delete it.on_use
    renderAttacks()
  }))

  const hr = document.createElement("hr"); statsHost.appendChild(hr)
  const note = document.createElement("div"); note.className = "muted"; note.textContent = "Inventory sprite (frame in atlas)"
  statsHost.appendChild(note)
  it.sprite = it.sprite || { w: 0, h: 0, x: 0, y: 0 }
  statsHost.appendChild(numField("sprite.x", it.sprite.x, (v) => { it.sprite.x = v || 0 }, 0.5))
  statsHost.appendChild(numField("sprite.y", it.sprite.y, (v) => { it.sprite.y = v || 0 }, 0.5))
  statsHost.appendChild(numField("sprite.w", it.sprite.w, (v) => { it.sprite.w = v || 0 }, 1))
  statsHost.appendChild(numField("sprite.h", it.sprite.h, (v) => { it.sprite.h = v || 0 }, 1))

  const hr2 = document.createElement("hr"); statsHost.appendChild(hr2)
  const sNote = document.createElement("div"); sNote.className = "muted"; sNote.textContent = "Stats (multipliers, blank = unset)"
  statsHost.appendChild(sNote)
  it.stats = it.stats || {}
  for (const k of STAT_FIELDS) {
    statsHost.appendChild(numField(k, it.stats[k], (v) => {
      if (v === undefined) delete it.stats[k]
      else it.stats[k] = v
    }, 0.05))
  }
}

function renderAttacks() {
  attacksHost.innerHTML = ""
  const it = currentItem()
  if (!it) return

  if (it.type !== "hand") {
    attacksHost.innerHTML = '<div class="muted">Only hand items can have attacks.</div>'
    document.getElementById("add-attack").disabled = true
    return
  }
  document.getElementById("add-attack").disabled = false

  if (!it.attacks) it.attacks = []
  for (let ai = 0; ai < it.attacks.length; ai++) {
    attacksHost.appendChild(renderAttack(it.attacks[ai], ai))
  }
}

function renderAttack(attack, ai) {
  const block = document.createElement("div")
  block.className = "list-block"

  const header = document.createElement("div")
  header.className = "list-block-header"
  const title = document.createElement("span")
  title.className = "list-block-title"
  title.textContent = `Attack ${ai}`
  const del = document.createElement("button")
  del.className = "small danger"
  del.textContent = "x"
  del.addEventListener("click", () => {
    currentItem().attacks.splice(ai, 1)
    renderAttacks()
  })
  header.appendChild(title); header.appendChild(del)
  block.appendChild(header)

  block.appendChild(selectField("animation", attack.animation, animations, (v) => attack.animation = v, {
    labelFor: (a) => a.display || `anim ${a.id}`,
  }))
  block.appendChild(numField("reload", attack.reload, (v) => attack.reload = v, 0.1))
  block.appendChild(numField("wait", attack.wait, (v) => {
    if (v === undefined) delete attack.wait
    else attack.wait = v
  }, 0.1))

  // projectiles
  const projLabel = document.createElement("div"); projLabel.className = "muted"; projLabel.textContent = "projectiles"
  block.appendChild(projLabel)
  if (!attack.projectiles) attack.projectiles = []
  for (let pi = 0; pi < attack.projectiles.length; pi++) {
    const proj = attack.projectiles[pi]
    const row = document.createElement("div"); row.className = "row"
    const sel = document.createElement("select")
    fillSelect(sel, projectiles, { labelFor: (p) => p.display || `proj ${p.id}` })
    sel.value = String(proj.id)
    sel.addEventListener("change", () => proj.id = Number(sel.value))
    row.appendChild(sel)
    const ang = document.createElement("input")
    ang.type = "number"; ang.step = 5; ang.style.width = "60px"
    ang.value = proj.angle ?? 0
    ang.title = "angle"
    ang.addEventListener("input", () => proj.angle = Number(ang.value) || 0)
    row.appendChild(ang)
    const x = document.createElement("button"); x.className = "small danger"; x.textContent = "x"
    x.addEventListener("click", () => { attack.projectiles.splice(pi, 1); renderAttacks() })
    row.appendChild(x)
    block.appendChild(row)
  }
  const addProj = document.createElement("button")
  addProj.className = "small"
  addProj.textContent = "+ projectile"
  addProj.addEventListener("click", () => {
    attack.projectiles.push({ id: projectiles[0]?.id ?? 0, angle: 0 })
    renderAttacks()
  })
  block.appendChild(addProj)

  // bombs
  const bombLabel = document.createElement("div"); bombLabel.className = "muted"; bombLabel.textContent = "bombs"; bombLabel.style.marginTop = "4px"
  block.appendChild(bombLabel)
  if (!attack.bombs) attack.bombs = []
  for (let bi = 0; bi < attack.bombs.length; bi++) {
    const bom = attack.bombs[bi]
    const row = document.createElement("div"); row.className = "row"
    const sel = document.createElement("select")
    fillSelect(sel, bombs, { labelFor: (b) => b.display || `bomb ${b.id}` })
    sel.value = String(bom.id)
    sel.addEventListener("change", () => bom.id = Number(sel.value))
    row.appendChild(sel)
    const ang = document.createElement("input")
    ang.type = "number"; ang.step = 5; ang.style.width = "60px"
    ang.value = bom.angle ?? 0
    ang.addEventListener("input", () => bom.angle = Number(ang.value) || 0)
    row.appendChild(ang)
    const x = document.createElement("button"); x.className = "small danger"; x.textContent = "x"
    x.addEventListener("click", () => { attack.bombs.splice(bi, 1); renderAttacks() })
    row.appendChild(x)
    block.appendChild(row)
  }
  const addBomb = document.createElement("button")
  addBomb.className = "small"
  addBomb.textContent = "+ bomb"
  addBomb.addEventListener("click", () => {
    attack.bombs.push({ id: bombs[0]?.id ?? 0, angle: 0 })
    renderAttacks()
  })
  block.appendChild(addBomb)

  return block
}

function renderVisual() {
  const tree = document.getElementById("obj-tree")
  const inspector = document.getElementById("obj-inspector")
  const it = currentItem()
  if (!it) return

  const tabs = document.createElement("div")
  tabs.className = "row wrap"
  tabs.style.marginBottom = "6px"

  const tabList = ["hand"]
  if (it.type !== "hand") tabList.push("equipped")

  for (const t of tabList) {
    const b = document.createElement("button")
    b.className = "small"
    if (t === visualTab) b.classList.add("primary")
    b.textContent = t
    b.addEventListener("click", () => { visualTab = t; renderVisual() })
    tabs.appendChild(b)
  }

  tree.innerHTML = ""
  tree.appendChild(tabs)

  const treeBody = document.createElement("div")
  tree.appendChild(treeBody)

  if (visualTab === "hand") {
    if (!it.hand || !Object.keys(it.hand).length) {
      const init = document.createElement("button")
      init.className = "small"
      init.textContent = "create hand container"
      init.addEventListener("click", () => {
        it.hand = { type: "container", label: "hand", children: [] }
        renderVisual(); scheduleRebuild()
      })
      treeBody.appendChild(init)
      inspector.innerHTML = '<div class="muted">No hand container.</div>'
    } else {
      objEditor = createObjectEditor(treeBody, inspector)
      objEditor.onChange(() => { it.hand = objEditor.getRoot(); scheduleRebuild() })
      objEditor.setRoot(it.hand)
    }
  } else if (visualTab === "equipped") {
    if (!it.equipped || !Object.keys(it.equipped).length) {
      const init = document.createElement("button")
      init.className = "small"
      init.textContent = `create ${it.type} container`
      init.addEventListener("click", () => {
        it.equipped = { type: "container", label: it.type, children: [] }
        renderVisual(); scheduleRebuild()
      })
      treeBody.appendChild(init)
      inspector.innerHTML = '<div class="muted">No equipped container.</div>'
    } else {
      objEditor = createObjectEditor(treeBody, inspector)
      objEditor.onChange(() => { it.equipped = objEditor.getRoot(); scheduleRebuild() })
      objEditor.setRoot(it.equipped)
    }
  }
}

itemSelect.addEventListener("change", () => {
  const idx = items.findIndex((p) => p.id === Number(itemSelect.value))
  if (idx >= 0) loadItem(idx)
})

document.getElementById("item-new").addEventListener("click", () => {
  const id = items.length
  const it = {
    id,
    display: `Item ${id}`,
    type: "hand",
    stats: {},
    sprite: { w: 0, h: 0, x: 0, y: 0 },
    hand: {},
    attacks: [],
  }
  items.push(it)
  reindexItems()
  currentIdx = items.length - 1
  refillItemSelect()
  itemSelect.value = String(id)
  loadItem(currentIdx)
})

document.getElementById("item-clone").addEventListener("click", () => {
  const src = currentItem()
  if (!src) return
  const copy = JSON.parse(JSON.stringify(src))
  copy.display = (src.display || "Item") + " Copy"
  items.splice(currentIdx + 1, 0, copy)
  reindexItems()
  currentIdx = currentIdx + 1
  refillItemSelect()
  itemSelect.value = String(copy.id)
  loadItem(currentIdx)
})

document.getElementById("item-delete").addEventListener("click", () => {
  if (items.length <= 1) return
  if (!confirm(`Delete "${currentItem().display}"?`)) return
  items.splice(currentIdx, 1)
  reindexItems()
  currentIdx = Math.max(0, currentIdx - 1)
  refillItemSelect()
  loadItem(currentIdx)
})

document.getElementById("add-attack").addEventListener("click", () => {
  const it = currentItem()
  if (it.type !== "hand") return
  if (!it.attacks) it.attacks = []
  it.attacks.push({ animation: 0, reload: 0.5, projectiles: [] })
  renderAttacks()
})

document.getElementById("zoom-in").addEventListener("click", () => {
  previewApi.setZoom(previewApi.getZoom() * 1.25); updateZoomLabel()
})
document.getElementById("zoom-out").addEventListener("click", () => {
  previewApi.setZoom(previewApi.getZoom() / 1.25); updateZoomLabel()
})
function updateZoomLabel() {
  document.getElementById("zoom-label").textContent = previewApi.getZoom().toFixed(2) + "x"
}

attachSaveButton(
  document.getElementById("save"),
  status,
  "items.json",
  () => {
    reindexItems()
    return items
  },
)

init().catch((e) => {
  status.textContent = "Init error: " + e.message
  status.style.color = "var(--danger)"
  console.error(e)
})
</script>
</body>
</html>
